services:
  db:
    image: postgres:16
    container_name: jira_lite_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:?Falta DB_NAME en .env (copia .env.example a .env)}
      POSTGRES_USER: ${DB_USER:?Falta DB_USER en .env (copia .env.example a .env)}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Falta DB_PASSWORD en .env (copia .env.example a .env)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: jira_lite_backend
    restart: always
    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:?Falta SECRET_KEY en .env (copia .env.example a .env y define una clave propia)}
      DEBUG: ${DEBUG:?Falta DEBUG en .env (copia .env.example a .env)}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?Falta ALLOWED_HOSTS en .env (copia .env.example a .env)}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Falta CORS_ALLOWED_ORIGINS en .env (copia .env.example a .env)}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:?Falta VITE_API_URL en .env (copia .env.example a .env)}
    container_name: jira_lite_frontend
    restart: always
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
